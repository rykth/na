version: 2

project_name: na

before:
  hooks:
    - go mod verify
    - go mod tidy

builds:
  - id: na-linux
    main: ./cmd/na
    binary: na
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/rykth/na/internal/config.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: na
    builds: [na-linux]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: rykth
    name: na
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
